<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khorvaire Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <script>
        console.log('Starting map initialization...');
        
        // Initialize map immediately
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom: 4,
            zoomDelta: 0.25
        });
        
        console.log('Map object created');
        
        // Define image bounds
        var bounds = [[0, 0], [4837, 7680]];
        
        // Add image overlay
        var imageUrl = '../images/True and Accurate Map of Khorvaire - Eberron - DM vers sv.jpg';
        
        var imageOverlay = L.imageOverlay(imageUrl, bounds);
        imageOverlay.addTo(map);
        
        // Fit map to bounds
        map.fitBounds(bounds);
        
        // Add some markers
        L.marker([1200, 2000]).addTo(map)
            .bindPopup('<b>Sharn</b><br>City of Towers');
        
        L.marker([2400, 3500]).addTo(map)
            .bindPopup('<b>The Mournland</b><br>Former Cyre');
        
        console.log('Map setup complete');
    </script>
</body>
</html>
