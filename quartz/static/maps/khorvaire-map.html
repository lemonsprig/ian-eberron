<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map of Khorvaire</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map { 
            height: 100vh; 
            width: 100%; 
        }
        .custom-popup {
            font-weight: bold;
            color: #2c3e50;
        }
        .popup-description {
            font-weight: normal;
            color: #34495e;
            margin-top: 5px;
        }
        /* Custom zoom control styling */
        .leaflet-control-zoom {
            border: 2px solid #8B4513 !important;
            border-radius: 8px !important;
        }
        .leaflet-control-zoom a {
            background-color: #f4f1de !important;
            color: #8B4513 !important;
            font-weight: bold !important;
        }
        .leaflet-control-zoom a:hover {
            background-color: #e9c46a !important;
        }
        
        /* Custom control styling */
        .custom-control {
            background-color: #f4f1de !important;
            border: 2px solid #8B4513 !important;
            border-radius: 4px !important;
            width: 34px !important;
            height: 34px !important;
            cursor: pointer !important;
            font-size: 16px !important;
            text-align: center !important;
            line-height: 30px !important;
            margin-bottom: 5px !important;
        }
        
        .custom-control:hover {
            background-color: #e9c46a !important;
        }
        
        .custom-control.active {
            background-color: #e9c46a !important;
            box-shadow: 0 0 5px rgba(139, 69, 19, 0.5) !important;
        }
        
        /* Coordinate display */
        .coordinate-display {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 4px;
            border: 2px solid #8B4513;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            min-width: 150px;
        }
        
        /* Modal for marker text input */
        .marker-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #8B4513;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .marker-modal input {
            width: 200px;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #8B4513;
            border-radius: 4px;
        }
        
        .marker-modal button {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .marker-modal .confirm {
            background-color: #e9c46a;
            color: #8B4513;
        }
        
        .marker-modal .cancel {
            background-color: #ccc;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="coordinates" class="coordinate-display">
        Hover to see coordinates
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <script>
        // Wait for Leaflet to load completely
        function initializeMap() {
            if (typeof L === 'undefined') {
                console.log('Waiting for Leaflet to load...');
                setTimeout(initializeMap, 100);
                return;
            }
            
            console.log('Starting enhanced Khorvaire map initialization...');
            
            // Initialize map with better controls
            var map = L.map('map', {
                crs: L.CRS.Simple,
                minZoom: -3,
                maxZoom: 5,
                zoomDelta: 0.25,
                wheelPxPerZoomLevel: 120,
                zoomSnap: 0.25
            });
            
            console.log('Map object created with enhanced zoom settings');
            
            // Define image bounds (adjust these based on your actual image dimensions)
            var bounds = [[0, 0], [4837, 7680]];
            
            // Add image overlay
            var imageUrl = '../images/True and Accurate Map of Khorvaire - Eberron_sv_player.jpeg';
 
            var imageOverlay = L.imageOverlay(imageUrl, bounds, {
                opacity: 1.0,
                interactive: true
            });
            imageOverlay.addTo(map);
            
            // Fit map to bounds and set initial view
            map.fitBounds(bounds);
            map.setView([2417, 3840], -1);
            
            // Enhanced markers with more detailed popups
            var locations = [
                {
                    coords: [517, 1743],
                    title: "Sharn",
                    description: "The City of Towers<br><em>The largest city in Breland and a major hub of commerce and intrigue.</em>"
                },
                {
                    coords: [1448, 4450],
                    title: "The Mournland",
                    description: "Former Nation of Cyre<br><em>A magical wasteland created by the Day of Mourning.</em>"
                },
                {
                    coords: [2328, 3797],
                    title: "Flamekeep",
                    description: "Capital of Thrane<br><em>Holy city and center of the Silver Flame.</em>"
                },
                {
                    coords: [2667, 3011],
                    title: "Fairhaven",
                    description: "Capital of Aundair<br><em>City of lights and magical learning.</em>"
                },
                {
                    coords: [2814, 4430],
                    title: "Korth",
                    description: "Capital of Karrnath<br><em>The White City, seat of ancient power.</em>"
                }
            ];
            
            // Add markers with custom styling
            locations.forEach(function(location) {
                var marker = L.marker(location.coords, {
                    opacity: 0.8
                }).addTo(map);
                
                marker.bindPopup(
                    '<div class="custom-popup">' + location.title + '</div>' +
                    '<div class="popup-description">' + location.description + '</div>',
                    {
                        maxWidth: 250,
                        className: 'custom-popup-container'
                    }
                );
            });
            
            // Add scale reference (optional)
            L.control.scale({
                position: 'bottomright',
                metric: false,
                imperial: true
            }).addTo(map);
            
            // Tool state variables
            var currentTool = 'none';
            var measurementPoints = [];
            var measurementLines = [];
            var measurementMarkers = [];
            var drawingPoints = [];
            var currentDrawing = null;
            var userMarkers = [];
            var userShapes = [];
            
            // Coordinate display
            var coordinateDisplay = document.getElementById('coordinates');
            
            map.on('mousemove', function(e) {
                var lat = e.latlng.lat.toFixed(0);
                var lng = e.latlng.lng.toFixed(0);
                coordinateDisplay.innerHTML = 'Coordinates: [' + lat + ', ' + lng + ']';
            });
            
            // Create custom control class
            function createCustomControl(position, icon, title, clickHandler) {
                var CustomControl = L.Control.extend({
                    onAdd: function(map) {
                        var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control custom-control');
                        container.title = title;
                        container.innerHTML = icon;
                        
                        L.DomEvent.disableClickPropagation(container);
                        L.DomEvent.disableScrollPropagation(container);
                        
                        container.onclick = function(e) {
                            e.stopPropagation();
                            e.preventDefault();
                            clickHandler(container);
                        }
                        
                        return container;
                    }
                });
                return new CustomControl({ position: position });
            }
            
            // Tool activation helper
            function activateTool(toolName, button) {
                // Deactivate all tools
                currentTool = 'none';
                document.querySelectorAll('.custom-control').forEach(function(btn) {
                    btn.classList.remove('active');
                });
                map.getContainer().style.cursor = '';
                
                // Clear any ongoing drawings
                if (currentDrawing) {
                    currentDrawing = null;
                    drawingPoints = [];
                }
                
                // Activate selected tool
                if (toolName !== 'none') {
                    currentTool = toolName;
                    button.classList.add('active');
                    
                    if (toolName === 'measure' || toolName === 'marker' || toolName === 'polygon' || toolName === 'polyline') {
                        map.getContainer().style.cursor = 'crosshair';
                    }
                }
            }
            
            // Measurement tool
            map.addControl(createCustomControl('topleft', '📏', 'Measurement Tool', function(button) {
                if (currentTool === 'measure') {
                    activateTool('none', button);
                    clearMeasurements();
                } else {
                    activateTool('measure', button);
                }
            }));
            
            // Marker placement tool
            map.addControl(createCustomControl('topleft', '📍', 'Place Custom Marker', function(button) {
                if (currentTool === 'marker') {
                    activateTool('none', button);
                } else {
                    activateTool('marker', button);
                }
            }));
            
            // Polygon drawing tool
            map.addControl(createCustomControl('topleft', '⬟', 'Draw Polygon', function(button) {
                if (currentTool === 'polygon') {
                    activateTool('none', button);
                    cancelCurrentDrawing();
                } else {
                    activateTool('polygon', button);
                }
            }));
            
            // Polyline drawing tool
            map.addControl(createCustomControl('topleft', '📏', 'Draw Line', function(button) {
                if (currentTool === 'polyline') {
                    activateTool('none', button);
                    cancelCurrentDrawing();
                } else {
                    activateTool('polyline', button);
                }
            }));
            
            // Rectangle drawing tool
            map.addControl(createCustomControl('topleft', '⬛', 'Draw Rectangle', function(button) {
                if (currentTool === 'rectangle') {
                    activateTool('none', button);
                } else {
                    activateTool('rectangle', button);
                }
            }));
            
            // Circle drawing tool
            map.addControl(createCustomControl('topleft', '⭕', 'Draw Circle', function(button) {
                if (currentTool === 'circle') {
                    activateTool('none', button);
                } else {
                    activateTool('circle', button);
                }
            }));
            
            // Clear all tool
            map.addControl(createCustomControl('topleft', '🗑️', 'Clear All User Elements', function(button) {
                clearAllUserElements();
            }));
            
            // Get coordinates tool
            map.addControl(createCustomControl('topleft', '📍', 'Get Coordinates (Click)', function(button) {
                if (currentTool === 'coordinates') {
                    activateTool('none', button);
                } else {
                    activateTool('coordinates', button);
                }
            }));
            
            // Helper functions
            function clearMeasurements() {
                measurementPoints = [];
                measurementLines.forEach(function(line) {
                    map.removeLayer(line);
                });
                measurementMarkers.forEach(function(marker) {
                    map.removeLayer(marker);
                });
                measurementLines = [];
                measurementMarkers = [];
            }
            
            function clearAllUserElements() {
                clearMeasurements();
                userMarkers.forEach(function(marker) {
                    map.removeLayer(marker);
                });
                userShapes.forEach(function(shape) {
                    map.removeLayer(shape);
                });
                userMarkers = [];
                userShapes = [];
                cancelCurrentDrawing();
            }
            
            function cancelCurrentDrawing() {
                if (currentDrawing) {
                    map.removeLayer(currentDrawing);
                    currentDrawing = null;
                }
                drawingPoints = [];
            }
            
            function calculateDistance(point1, point2) {
                var dx = point2.lng - point1.lng;
                var dy = point2.lat - point1.lat;
                return Math.sqrt(dx * dx + dy * dy);
            }
            
            function pixelsToMiles(pixels) {
                var scaleFactorMilesPerPixel = 0.5;
                return pixels * scaleFactorMilesPerPixel;
            }
            
            function showMarkerModal(latlng, callback) {
                var overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                
                var modal = document.createElement('div');
                modal.className = 'marker-modal';
                modal.innerHTML = 
                    '<h3>Add Marker</h3>' +
                    '<input type="text" id="markerTitle" placeholder="Marker title" /><br>' +
                    '<input type="text" id="markerDesc" placeholder="Description (optional)" /><br>' +
                    '<button class="confirm" onclick="confirmMarker()">Add Marker</button>' +
                    '<button class="cancel" onclick="cancelMarker()">Cancel</button>';
                
                document.body.appendChild(overlay);
                document.body.appendChild(modal);
                document.getElementById('markerTitle').focus();
                
                window.confirmMarker = function() {
                    var title = document.getElementById('markerTitle').value || 'Custom Marker';
                    var desc = document.getElementById('markerDesc').value || '';
                    document.body.removeChild(overlay);
                    document.body.removeChild(modal);
                    callback(title, desc);
                    delete window.confirmMarker;
                    delete window.cancelMarker;
                }
                
                window.cancelMarker = function() {
                    document.body.removeChild(overlay);
                    document.body.removeChild(modal);
                    delete window.confirmMarker;
                    delete window.cancelMarker;
                }
            }
            
            // Main click handler
            map.on('click', function(e) {
                if (currentTool === 'measure') {
                    measurementPoints.push(e.latlng);
                    
                    var marker = L.circleMarker(e.latlng, {
                        color: '#e74c3c',
                        fillColor: '#e74c3c',
                        fillOpacity: 0.8,
                        radius: 5
                    }).addTo(map);
                    measurementMarkers.push(marker);
                    
                    if (measurementPoints.length >= 2) {
                        var lastTwo = measurementPoints.slice(-2);
                        var line = L.polyline(lastTwo, {
                            color: '#e74c3c',
                            weight: 3,
                            opacity: 0.8,
                            dashArray: '5, 10'
                        }).addTo(map);
                        
                        measurementLines.push(line);
                        
                        var distance = calculateDistance(lastTwo[0], lastTwo[1]);
                        var miles = pixelsToMiles(distance);
                        
                        var midpoint = L.latLng(
                            (lastTwo[0].lat + lastTwo[1].lat) / 2,
                            (lastTwo[0].lng + lastTwo[1].lng) / 2
                        );
                        
                        var distanceMarker = L.marker(midpoint, {
                            icon: L.divIcon({
                                className: 'distance-label',
                                html: '<div style="background: rgba(255,255,255,0.9); padding: 3px 6px; border-radius: 3px; font-size: 12px; font-weight: bold; border: 1px solid #e74c3c; color: #e74c3c;">' + 
                                      distance.toFixed(0) + 'px<br>' + 
                                      miles.toFixed(1) + 'mi</div>',
                                iconSize: [60, 30],
                                iconAnchor: [30, 15]
                            })
                        }).addTo(map);
                        
                        measurementMarkers.push(distanceMarker);
                    }
                    
                } else if (currentTool === 'marker') {
                    showMarkerModal(e.latlng, function(title, description) {
                        var marker = L.marker(e.latlng).addTo(map);
                        marker.bindPopup(
                            '<div class="custom-popup">' + title + '</div>' +
                            (description ? '<div class="popup-description">' + description + '</div>' : ''),
                            { maxWidth: 250 }
                        );
                        userMarkers.push(marker);
                    });
                    
                } else if (currentTool === 'coordinates') {
                    var lat = e.latlng.lat.toFixed(0);
                    var lng = e.latlng.lng.toFixed(0);
                    alert('Coordinates: [' + lat + ', ' + lng + ']');
                    
                } else if (currentTool === 'polygon') {
                    drawingPoints.push(e.latlng);
                    
                    if (drawingPoints.length === 1) {
                        // Start polygon
                        currentDrawing = L.polygon([e.latlng], {
                            color: '#3388ff',
                            fillOpacity: 0.3
                        }).addTo(map);
                    } else {
                        // Update polygon
                        currentDrawing.setLatLngs(drawingPoints);
                    }
                    
                } else if (currentTool === 'polyline') {
                    drawingPoints.push(e.latlng);
                    
                    if (drawingPoints.length === 1) {
                        // Start polyline
                        currentDrawing = L.polyline([e.latlng], {
                            color: '#3388ff',
                            weight: 3
                        }).addTo(map);
                    } else {
                        // Update polyline
                        currentDrawing.setLatLngs(drawingPoints);
                    }
                    
                } else if (currentTool === 'rectangle') {
                    if (!currentDrawing) {
                        // Start rectangle
                        currentDrawing = { startPoint: e.latlng };
                    } else {
                        // Finish rectangle
                        var bounds = L.latLngBounds(currentDrawing.startPoint, e.latlng);
                        var rectangle = L.rectangle(bounds, {
                            color: '#3388ff',
                            fillOpacity: 0.3
                        }).addTo(map);
                        userShapes.push(rectangle);
                        currentDrawing = null;
                    }
                    
                } else if (currentTool === 'circle') {
                    if (!currentDrawing) {
                        // Start circle
                        currentDrawing = { center: e.latlng };
                    } else {
                        // Finish circle
                        var radius = calculateDistance(currentDrawing.center, e.latlng);
                        var circle = L.circle(currentDrawing.center, {
                            radius: radius,
                            color: '#3388ff',
                            fillOpacity: 0.3
                        }).addTo(map);
                        userShapes.push(circle);
                        currentDrawing = null;
                    }
                }
            });
            
            // Double-click to finish polygon/polyline
            map.on('dblclick', function(e) {
                if (currentTool === 'polygon' || currentTool === 'polyline') {
                    if (currentDrawing && drawingPoints.length > 2) {
                        userShapes.push(currentDrawing);
                        currentDrawing = null;
                        drawingPoints = [];
                    }
                }
            });
            
            // Handle image load errors gracefully
            imageOverlay.on('error', function() {
                console.error('Failed to load map image');
                alert('Map image failed to load. Please check the image path.');
            });
            
            console.log('Enhanced map setup complete with drawing tools');
        }
        
        // Start initialization when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeMap);
        } else {
            initializeMap();
        }
    </script>
</body>
</html>
